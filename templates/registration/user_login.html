{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center ">
    <div class="col-md-3">
        <div class="card bg-dark text-light shadow p-4">
            <h3 class="text-center mb-4 fw-bolder">Login</h3>

            <form method="POST">
                {% csrf_token %}

                <div class="m-3">
                    <label>Username</label>
                    {{ form.username }}
                </div>

                <div class="m-3 mt-4">
                    <label>Password</label>
                    {{ form.password }}
                </div>

                {% if form.errors %}
                    <div class="text-danger small ">
                        Invalid username or password
                    </div>
                {% endif %}

                <button type="submit" class="btn btn-primary mt-3    w-100">
                    Login
                </button>
                <a class="nav-link text-primary text-center" href="{% url 'register' %}">don't have account?</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
