{% load static %}
<!DOCTYPE html>
<html>

<head>
    <title>Bus Management System</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">


    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        .navbar {
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        .card {
            border-radius: 12px;
        }
    </style>


</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-danger px-4 d-flex justify-content-between ">
        <a class="navbar-brand fw-bolder fs-3" href="{% url 'bus_list' %}">
            BMS
        </a>


        {% if request.user.is_authenticated %}
        <div class="d-flex gap-5">
            <div>
                <i class="bi bi-person-circle text-dark fs-2"></i>
                <span class="fw-bolder m-2 text-light">{{request.user}}</span>
            </div>

            <a class="btn btn-dark p-2" href="{% url 'log_out'     %}">LOOUT</a>
        </div>
        {% else %}
        <a class="btn btn-dark" href="{% url 'user_login' %}">LOGIN</a>
        {% endif %}
    </nav>

    <div class="container-fluid mt-5">
        {% block content %}
        {% endblock %}
    </div>


</body>

</html>
