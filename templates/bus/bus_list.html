{% load static%}
<!DOCTYPE html>
<html>

<head>
    <title>Bus List</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css'%}">
</head>

<body>






    <section>
        <div class="container-fluid bg-dark text-light w-75 p-4 mt-5 rounded">
            <div class="row">
                <div class="col-md-12 m-auto">
                    <div class="d-flex justify-content-between m-2">

                        <h2 class="fw-bolder ">Bus List</h2>
                        <a class="btn btn-warning" href="{% url 'bus_create' %}">Add New Bus</a>
                    </div>
                    <table class="table table-striped table-primary table-hover rounded" border="2">
                        <tr class="rounded">
                            <th >Bus No</th>
                            <th >Bus Name</th>
                            <th >Source</th>
                            <th >Destination</th>
                            <th >Price</th>
                            <th >Actions</th>
                        </tr>

                        {% for bus in buses %}
                        <tr>
                            <td>{{bus.bus_no}}</td>
                            <td>{{ bus.bus_name }}</td>
                            <td>{{ bus.source }}</td>
                            <td>{{ bus.destination }}</td>
                            <td>{{ bus.price }}</td>
                            <td>
                                <a class="btn btn-success" href="{% url 'bus_update' bus.id %}">Edit</a>
                                <a class="btn btn-danger" href="{% url 'bus_delete' bus.id %}">Delete</a>
                            </td>
                        </tr>
                        {% endfor %}

                    </table>


                </div>
            </div>
        </div>

    </section>



</body>

</html>
