{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center ">
    <div class="col-md-4 ">
        <div class="card shadow p-4 bg-secondary text-dark fw-bolder">
            <h3 class="mb-4 text-center fw-bolder">
                {% if form.instance.pk %}
                    Update Bus
                {% else %}
                    Add Bus
                {% endif %}
            </h3>

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Bus No</label>
                    {{ form.bus_no }}
                </div>

                <div class="mb-3">
                    <label class="form-label">Bus Name</label>
                    {{ form.bus_name }}
                </div>

                <div class="mb-3">
                    <label class="form-label">Source</label>
                    {{ form.source }}
                </div>

                <div class="mb-3">
                    <label class="form-label">Destination</label>
                    {{ form.destination }}
                </div>

                <div class="mb-3">
                    <label class="form-label">Price</label>
                    {{ form.price }}
                </div>

                <div class="d-flex justify-content-between">
                    <button type="submit" class="btn btn-warning">Save</button>
                    <a href="{% url 'bus_list' %}" class="btn btn-dark">Back</a>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
