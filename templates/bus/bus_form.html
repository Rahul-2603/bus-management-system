{% extends 'base.html' %}

{% block content %}
<div class="container   bg-danger rounded-3 p-4">
    <div class="container ">
        <div class="card shadow-lg border-0 p-4">
            <h2 class="text-center mb-4 fw-bold">Add Bus</h2>

            <form method="POST">
                {% csrf_token %}

                <div class="row g-4">

                    <div class="col-md-4">
                        <label class="form-label">Bus Number</label>
                        {{ form.bus_no }}
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Bus Name</label>
                        {{ form.bus_name }}
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Bus Type</label>
                        {{ form.bus_type }}
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Source</label>
                        {{ form.source }}
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Destination</label>
                        {{ form.destination }}
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Arrival Time</label>
                        {{ form.arrival_time }}
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Departure Time</label>
                        {{ form.departure_time }}
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Price</label>
                        {{ form.price }}
                    </div>

                </div>

                <div class="d-flex justify-content-between mt-4">
                    <button type="submit" class="btn btn-warning px-4">
                        Save
                    </button>

                    <a href="{% url 'bus_list' %}" class="btn btn-dark px-4">
                        Back
                    </a>
                </div>

            </form>
        </div>
    </div>
</div>

{% endblock %}
